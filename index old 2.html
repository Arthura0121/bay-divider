<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bay Board</title>
<style>
  :root {
    --pine: #0A1622;
    --panel: #12283F;
    --panel-border: #28496A;
    --wood: #0B1C2C;
    --parchment: #FFFFFF;
    --parchment-edge: #DCE6EF;
    --blue: #3E92CC;
    --orange: #F2793A;
    --ink: #0F2438;
    --cream: #F5F8FB;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--pine); font-family: system-ui, -apple-system, "Segoe UI", sans-serif; min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; padding: 18px 14px 60px; }

  .loading { color: var(--cream); text-align: center; padding: 60px 0; font-size: 14px; opacity: 0.6; }

  .header { background: var(--wood); border: 3px solid var(--blue); border-radius: 12px; padding: 16px;
    box-shadow: 0 6px 0 rgba(0,0,0,0.35); display: flex; align-items: center; gap: 12px; }
  .header-badge { width: 46px; height: 46px; border-radius: 50%; background: var(--orange); border: 2px solid var(--blue);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 22px; }
  .header-title { color: var(--cream); font-size: 21px; font-weight: 800; letter-spacing: 0.2px; line-height: 1.15; }
  .header-sub { color: var(--blue); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; }

  .section { margin-top: 16px; background: var(--panel); border: 2px solid var(--panel-border); border-radius: 14px; padding: 14px; }
  .section-label { display: flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--blue); margin-bottom: 10px; }

  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .row.dim { opacity: 0.4; }
  .name-label { color: var(--cream); font-size: 13.5px; font-weight: 700; flex: 1; letter-spacing: 0.2px; }

  select, input[type="text"], input[type="password"] {
    background: #00000026; border: 1px solid #3E92CC55; border-radius: 7px; padding: 7px 8px;
    color: var(--cream); font-size: 13px; font-family: inherit;
  }
  select:disabled { opacity: 0.5; }
  input::placeholder { color: #ffffff88; }

  .switch { width: 38px; height: 22px; border-radius: 11px; flex-shrink: 0; border: none; cursor: pointer;
    position: relative; padding: 0; background: #FFFFFF26; transition: background 0.15s ease; }
  .switch.on { background: var(--blue); }
  .switch .knob { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%;
    background: var(--cream); transition: left 0.15s ease; }
  .switch.on .knob { left: 18px; background: #040B12; }

  /* role selection */
  .role-pick { margin-top: 18px; display: flex; flex-direction: column; gap: 10px; }
  .role-btn { background: var(--orange); color: var(--wood); border: none; border-radius: 12px; padding: 16px;
    font-size: 15px; font-weight: 800; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.3); }
  .role-btn.secondary { background: var(--panel); color: var(--cream); border: 2px solid var(--blue); box-shadow: none; }

  .board-overview { margin-top: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .mini-bay { background: var(--panel); border: 2px solid var(--panel-border); border-radius: 10px; padding: 10px 12px;
    display: flex; justify-content: space-between; align-items: center; }
  .mini-bay.closed { opacity: 0.45; }
  .mini-bay-name { color: var(--cream); font-weight: 700; font-size: 13px; }
  .mini-bay-status { color: var(--blue); font-size: 11.5px; font-weight: 600; }

  .pin-input { width: 100%; text-align: center; letter-spacing: 4px; font-size: 18px; padding: 12px; }
  .pin-error { color: var(--orange); font-size: 12.5px; margin-top: 8px; text-align: center; min-height: 16px; }

  .link-btn { display: block; width: 100%; text-align: center; background: transparent; border: none;
    color: var(--blue); opacity: 0.75; font-size: 12.5px; margin-top: 14px; cursor: pointer; }

  .bay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .bay-tile { background: #00000026; border: 2px solid var(--panel-border); border-radius: 12px; padding: 14px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
  .bay-tile.mine { border-color: var(--orange); background: #F2793A22; }
  .bay-tile-name { color: var(--cream); font-weight: 800; font-size: 15px; }
  .bay-tile-count { color: var(--blue); font-size: 11.5px; font-weight: 600; }
  .bay-tile-tag { color: var(--orange); font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }

  .duty-card { margin-top: 16px; border-radius: 16px; overflow: hidden; border: 3px solid var(--blue);
    box-shadow: 0 8px 0 rgba(0,0,0,0.35); }
  .duty-banner { background: var(--orange); padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; }
  .duty-time { color: var(--cream); font-weight: 800; font-size: 14px; }
  .duty-people { color: var(--wood); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .duty-body { background: var(--parchment); padding: 16px; }

  .empty-msg { text-align: center; font-size: 13px; padding: 8px 0; }
  .empty-msg.none-needed { color: var(--ink); opacity: 0.55; }

  .stat-row { display: flex; gap: 10px; justify-content: center; }
  .stat-block { text-align: center; padding: 0 6px; min-width: 92px; }
  .stat-count { font-size: 32px; font-weight: 900; color: var(--orange); line-height: 1; }
  .stat-people-label { font-size: 10.5px; font-weight: 700; color: var(--ink); opacity: 0.6; text-transform: uppercase;
    letter-spacing: 1px; margin-top: 2px; }
  .stat-time { font-size: 16px; font-weight: 800; color: var(--ink); margin-top: 6px; }
  .stat-each { font-size: 9.5px; color: var(--ink); opacity: 0.5; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-divider { width: 2px; background: var(--parchment-edge); align-self: stretch; flex-shrink: 0; }

  .shortage { display: flex; gap: 7px; align-items: center; margin-top: 10px; background: #F2793A33;
    border: 1px solid var(--orange); border-radius: 8px; padding: 8px 10px; }
  .shortage span:last-child { font-size: 11.5px; color: var(--ink); font-weight: 600; }
  .duty-card .shortage, .admin-bay-card .shortage { color: var(--ink); }

  .add-row { display: flex; align-items: center; gap: 6px; justify-content: center; background: var(--orange);
    color: var(--wood); border: none; border-radius: 10px; padding: 12px 10px; font-size: 13.5px; font-weight: 800;
    cursor: pointer; width: 100%; margin-top: 12px; }
  .add-row.danger { background: transparent; border: 1.5px solid var(--orange); color: var(--orange); }

  .admin-bay-card { margin-top: 14px; background: var(--panel); border: 2px solid var(--panel-border); border-radius: 14px;
    overflow: hidden; }
  .admin-bay-card.bay-closed { opacity: 0.55; }
  .admin-bay-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
  .admin-bay-title { color: var(--cream); font-weight: 800; font-size: 15px; flex: 1; }
  .admin-bay-count { color: var(--blue); font-size: 11.5px; font-weight: 700; }
  .admin-bay-body { padding: 0 14px 14px; }
  .positions-block { border-top: 1px solid var(--panel-border); padding-top: 10px; margin-bottom: 10px; }
  .roster-block { border-top: 1px solid var(--panel-border); padding-top: 10px; margin-bottom: 10px; }
  .roster-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; color: var(--cream); font-size: 12.5px; }
  .roster-row span:first-child { flex: 1; font-weight: 600; }
  .roster-time { color: var(--blue); font-weight: 700; }
  .roster-move { font-size: 11.5px; padding: 5px 6px; }
  .mini-split { font-size: 12px; color: var(--cream); opacity: 0.85; background: #00000026; border-radius: 8px;
    padding: 8px 10px; margin-top: 6px; }
</style>
</head>
<body>
  <div class="app" id="root">
    <div class="loading">Connecting…</div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
